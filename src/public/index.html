<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hub Chat</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
<style>
  :root {
    --bg: #f5f5f5;
    --card: #fff;
    --border: #e0e0e0;
    --accent: #1a1a2e;
    --accent-light: #e8eaf6;
    --muted: #888;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--accent);
    color: #fff;
    padding: 12px 20px;
    font-size: 16px;
    font-weight: 600;
    flex-shrink: 0;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* --- Message layout --- */
  .msg {
    max-width: 80%;
    line-height: 1.6;
    word-break: break-word;
    font-size: 14px;
    animation: fade-in 200ms ease-out;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    padding: 10px 14px;
    border-radius: var(--radius);
    white-space: pre-wrap;
  }
  .msg.assistant {
    align-self: flex-start;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  /* --- Avatar --- */
  .chat-avatar {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-sm);
    background: var(--accent);
    color: #fff;
    display: grid;
    place-items: center;
    font-weight: 600;
    font-size: 14px;
    flex-shrink: 0;
  }

  /* --- Message bubble --- */
  .msg-body {
    flex: 1;
    min-width: 0;
    position: relative;
  }
  .msg-bubble {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    position: relative;
  }
  .msg-bubble.streaming {
    animation: pulsing-border 1.5s ease-out infinite;
  }

  /* --- Thinking block --- */
  .chat-thinking {
    margin-bottom: 8px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    border: 1px dashed rgba(0,0,0,0.15);
    background: rgba(0,0,0,0.02);
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
    cursor: pointer;
    overflow: hidden;
  }
  .chat-thinking.collapsed {
    max-height: 40px;
  }
  .chat-thinking .thinking-toggle {
    font-size: 11px;
    color: #aaa;
    margin-bottom: 4px;
    user-select: none;
  }
  .chat-thinking .thinking-content {
    white-space: pre-wrap;
  }

  /* --- Tool cards --- */
  .tool-cards { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .tool-card {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    background: #f0f4ff;
    border: 1px solid #d0d8f0;
    font-size: 12px;
    color: #333;
  }
  .tool-card__icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    display: grid;
    place-items: center;
  }
  .tool-card__spinner {
    width: 14px;
    height: 14px;
    border: 2px solid #cbd5e1;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .tool-card__check { color: #22c55e; font-weight: bold; }
  .tool-card__name { font-weight: 500; }
  .tool-card__result {
    margin-top: 4px;
    padding: 4px 8px;
    background: #f8fafc;
    border-radius: 4px;
    font-family: "SF Mono", Monaco, Consolas, monospace;
    font-size: 11px;
    line-height: 1.4;
    white-space: pre-wrap;
    word-break: break-all;
    color: #555;
    max-height: 200px;
    overflow-y: auto;
  }
  .tool-card__result.collapsed {
    max-height: 42px;
    overflow: hidden;
    cursor: pointer;
  }
  .tool-card__result.collapsed::after {
    content: "... click to expand";
    display: block;
    color: #3b82f6;
    font-size: 10px;
    margin-top: 2px;
  }
  .tool-card.has-result { flex-direction: column; align-items: stretch; }
  .tool-card.has-result .tool-card__header { display: flex; align-items: center; gap: 8px; }

  /* --- Copy button --- */
  .chat-copy-btn {
    position: absolute;
    top: 6px;
    right: 8px;
    background: rgba(0,0,0,0.06);
    border: none;
    border-radius: 4px;
    padding: 3px 6px;
    font-size: 11px;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 120ms ease-out;
    color: #555;
  }
  .msg-bubble:hover .chat-copy-btn {
    opacity: 1;
    pointer-events: auto;
  }
  .chat-copy-btn:hover { background: rgba(0,0,0,0.1); }

  /* --- Reading indicator --- */
  .reading-indicator {
    align-self: flex-start;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: fade-in 200ms ease-out;
  }
  .reading-dots {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .reading-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: reading-pulse 1.4s ease-in-out infinite;
  }
  .reading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .reading-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* --- Markdown content --- */
  .md-content p { margin: 0.4em 0; }
  .md-content p:first-child { margin-top: 0; }
  .md-content p:last-child { margin-bottom: 0; }
  .md-content h1, .md-content h2, .md-content h3, .md-content h4 {
    margin: 0.6em 0 0.3em;
    line-height: 1.3;
  }
  .md-content h1 { font-size: 1.3em; }
  .md-content h2 { font-size: 1.15em; }
  .md-content h3 { font-size: 1.05em; }
  .md-content ul, .md-content ol {
    margin: 0.4em 0;
    padding-left: 1.5em;
  }
  .md-content li { margin: 0.15em 0; }
  .md-content code {
    background: #f0f0f0;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 0.9em;
    font-family: "SF Mono", Monaco, Consolas, monospace;
  }
  .md-content pre {
    margin: 0.5em 0;
    border-radius: var(--radius-sm);
    overflow-x: auto;
    position: relative;
  }
  .md-content pre code {
    display: block;
    padding: 12px 14px;
    background: #0d1117;
    color: #e6edf3;
    font-size: 12px;
    line-height: 1.5;
    border-radius: var(--radius-sm);
  }
  .md-content pre .code-copy-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 10px;
    cursor: pointer;
    color: #aaa;
    opacity: 0;
    transition: opacity 120ms;
  }
  .md-content pre:hover .code-copy-btn { opacity: 1; }
  .md-content pre .code-copy-btn:hover { background: rgba(255,255,255,0.2); }
  .md-content blockquote {
    margin: 0.4em 0;
    padding: 4px 12px;
    border-left: 3px solid #d0d0d0;
    color: #666;
  }
  .md-content table {
    border-collapse: collapse;
    margin: 0.5em 0;
    font-size: 13px;
  }
  .md-content th, .md-content td {
    border: 1px solid var(--border);
    padding: 5px 10px;
    text-align: left;
  }
  .md-content th { background: #f8f8f8; font-weight: 600; }
  .md-content a { color: #2563eb; text-decoration: none; }
  .md-content a:hover { text-decoration: underline; }
  .md-content hr { border: none; border-top: 1px solid var(--border); margin: 0.6em 0; }

  /* --- Cost badge --- */
  .cost {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    text-align: right;
  }

  /* --- Input area --- */
  #input-area {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: #fff;
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #input {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
    outline: none;
  }
  #input:focus { border-color: var(--accent); }
  #send {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }

  /* --- Animations --- */
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulsing-border {
    0%, 100% { border-color: var(--border); }
    50% { border-color: #3b82f6; }
  }
  @keyframes reading-pulse {
    0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
    30% { opacity: 1; transform: scale(1); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <header>
    <span>AI Hub Chat</span>
    <span id="auth-status" style="float:right;font-size:12px;font-weight:400;opacity:0.7"></span>
  </header>
  <div id="auth-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:12px;padding:24px;max-width:360px;width:90%;text-align:center;">
      <h3 style="margin-bottom:12px;">Enter Access Token</h3>
      <input id="token-input" type="password" placeholder="Paste your token..." style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px;">
      <button id="token-submit" style="background:#1a1a2e;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;cursor:pointer;width:100%;">Connect</button>
      <p id="token-error" style="color:#e53e3e;font-size:12px;margin-top:8px;display:none;"></p>
    </div>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Ask anything..."></textarea>
    <button id="send">Send</button>
  </div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
<script>
// --- Auth ---
let authToken = localStorage.getItem("chat_token") || "";

async function checkAuth() {
  try {
    const headers = { "Content-Type": "application/json" };
    if (authToken) headers["Authorization"] = "Bearer " + authToken;

    const res = await fetch("/api/chat", {
      method: "POST",
      headers,
      body: JSON.stringify({ message: "/status" }),
    });

    if (res.status === 401) {
      showAuthOverlay();
      return false;
    }

    // Consume stream to avoid dangling connection
    try { await res.text(); } catch {}

    if (authToken) {
      document.getElementById("auth-status").textContent = "Authenticated";
    }
    return true;
  } catch {
    return true; // Network error — don't block, let normal flow handle it
  }
}

function showAuthOverlay() {
  const overlay = document.getElementById("auth-overlay");
  overlay.style.display = "flex";
}

function hideAuthOverlay() {
  document.getElementById("auth-overlay").style.display = "none";
}

// --- Config ---
const TOOL_INLINE_THRESHOLD = 80;

// --- Markdown setup ---
marked.setOptions({ gfm: true, breaks: true });

function renderMarkdown(text) {
  if (!text) return "";
  try {
    return marked.parse(text);
  } catch { return escapeHtml(text); }
}

function escapeHtml(s) {
  const div = document.createElement("div");
  div.textContent = s;
  return div.innerHTML;
}

// --- Thinking extraction ---
function extractThinking(text) {
  const re = /<\s*think(?:ing)?\s*>([\s\S]*?)<\s*\/\s*think(?:ing)?\s*>/gi;
  const blocks = [];
  let cleaned = text;
  let match;
  while ((match = re.exec(text)) !== null) {
    blocks.push(match[1].trim());
  }
  cleaned = text.replace(re, "").trim();
  return { thinking: blocks.join("\n\n"), cleaned };
}

// --- DOM refs ---
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("send");
let sessionId = localStorage.getItem("chat_sessionId") || null;
let sending = false;

// --- Auto-resize textarea ---
inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
});
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener("click", send);

// --- Reading indicator ---
function showReadingIndicator() {
  const el = document.createElement("div");
  el.className = "reading-indicator";
  el.id = "reading-indicator";
  el.innerHTML = `
    <div class="chat-avatar">A</div>
    <div class="reading-dots"><span></span><span></span><span></span></div>
  `;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

function removeReadingIndicator() {
  const el = document.getElementById("reading-indicator");
  if (el) el.remove();
}

// --- Tool card helpers ---
let toolCardCounter = 0;

function createToolCard(toolName) {
  const id = "tool-" + (++toolCardCounter);
  const card = document.createElement("div");
  card.className = "tool-card";
  card.id = id;
  card.innerHTML = `
    <div class="tool-card__icon"><div class="tool-card__spinner"></div></div>
    <span class="tool-card__name">${escapeHtml(toolName)}</span>
  `;
  return { card, id };
}

function updateToolCard(cardId, toolName, output) {
  const card = document.getElementById(cardId);
  if (!card) return;

  const isShort = output && output.length <= TOOL_INLINE_THRESHOLD;
  const hasOutput = output && output.trim().length > 0;

  if (hasOutput) {
    card.className = "tool-card has-result";
    const resultClass = isShort ? "tool-card__result" : "tool-card__result collapsed";
    card.innerHTML = `
      <div class="tool-card__header">
        <div class="tool-card__icon"><span class="tool-card__check">✓</span></div>
        <span class="tool-card__name">${escapeHtml(toolName)}</span>
      </div>
      <div class="${resultClass}">${escapeHtml(output.slice(0, 2000))}</div>
    `;
    if (!isShort) {
      const resultEl = card.querySelector(".tool-card__result");
      resultEl.addEventListener("click", () => resultEl.classList.toggle("collapsed"));
    }
  } else {
    card.innerHTML = `
      <div class="tool-card__icon"><span class="tool-card__check">✓</span></div>
      <span class="tool-card__name">${escapeHtml(toolName)}</span>
      <span style="color:#888;font-size:11px;">done</span>
    `;
  }
}

// --- Copy button ---
function addCopyButton(bubbleEl, rawText) {
  const btn = document.createElement("button");
  btn.className = "chat-copy-btn";
  btn.textContent = "Copy";
  btn.addEventListener("click", async (e) => {
    e.stopPropagation();
    try {
      await navigator.clipboard.writeText(rawText);
      btn.textContent = "✓";
      setTimeout(() => (btn.textContent = "Copy"), 1500);
    } catch {
      btn.textContent = "Failed";
      setTimeout(() => (btn.textContent = "Copy"), 1500);
    }
  });
  bubbleEl.appendChild(btn);
}

// --- Code block copy buttons ---
function addCodeCopyButtons(container) {
  container.querySelectorAll("pre code").forEach((codeEl) => {
    hljs.highlightElement(codeEl);
    const pre = codeEl.parentElement;
    if (pre.querySelector(".code-copy-btn")) return;
    const btn = document.createElement("button");
    btn.className = "code-copy-btn";
    btn.textContent = "Copy";
    btn.addEventListener("click", async (e) => {
      e.stopPropagation();
      try {
        await navigator.clipboard.writeText(codeEl.textContent);
        btn.textContent = "✓";
        setTimeout(() => (btn.textContent = "Copy"), 1500);
      } catch {
        btn.textContent = "Failed";
        setTimeout(() => (btn.textContent = "Copy"), 1500);
      }
    });
    pre.style.position = "relative";
    pre.appendChild(btn);
  });
}

// --- Send message ---
async function send() {
  const text = inputEl.value.trim();
  if (!text || sending) return;

  sending = true;
  sendBtn.disabled = true;
  inputEl.value = "";
  inputEl.style.height = "auto";

  // Append user message
  appendUserMsg(text);

  // Show reading indicator
  showReadingIndicator();

  // Create assistant message container (hidden until first content)
  const { msgEl, toolCardsEl, thinkingEl, bubbleEl, mdEl } = createAssistantMsg();
  let assistantVisible = false;
  let fullText = "";
  let rawThinking = "";
  let currentToolCardId = null;
  let gotFirstToken = false;

  function showAssistant() {
    if (!assistantVisible) {
      removeReadingIndicator();
      messagesEl.appendChild(msgEl);
      assistantVisible = true;
    }
  }

  try {
    const headers = { "Content-Type": "application/json" };
    if (authToken) headers["Authorization"] = "Bearer " + authToken;

    const res = await fetch("/api/chat", {
      method: "POST",
      headers,
      body: JSON.stringify({ message: text, sessionId }),
    });

    if (res.status === 401) {
      removeReadingIndicator();
      localStorage.removeItem("chat_token");
      authToken = "";
      showAuthOverlay();
      sending = false;
      sendBtn.disabled = false;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split("\n");
      buffer = lines.pop() || "";

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith("data: ")) continue;
        let event;
        try { event = JSON.parse(trimmed.slice(6)); } catch { continue; }

        if (event.type === "text") {
          showAssistant();
          if (!gotFirstToken) {
            gotFirstToken = true;
            bubbleEl.classList.add("streaming");
          }
          fullText += event.content;

          // Extract thinking blocks during streaming
          const { thinking, cleaned } = extractThinking(fullText);

          if (thinking) {
            rawThinking = thinking;
            thinkingEl.style.display = "block";
            thinkingEl.querySelector(".thinking-content").textContent = thinking;
          }

          mdEl.innerHTML = renderMarkdown(cleaned);
          addCodeCopyButtons(mdEl);
          messagesEl.scrollTop = messagesEl.scrollHeight;

        } else if (event.type === "tool_use") {
          showAssistant();
          const { card, id } = createToolCard(event.tool);
          currentToolCardId = id;
          toolCardsEl.appendChild(card);
          messagesEl.scrollTop = messagesEl.scrollHeight;

        } else if (event.type === "tool_result") {
          if (currentToolCardId) {
            updateToolCard(currentToolCardId, event.tool, event.output);
            currentToolCardId = null;
          }
          messagesEl.scrollTop = messagesEl.scrollHeight;

        } else if (event.type === "error") {
          showAssistant();
          fullText += "\n[Error: " + event.message + "]";
          const { thinking, cleaned } = extractThinking(fullText);
          mdEl.innerHTML = renderMarkdown(cleaned);
          messagesEl.scrollTop = messagesEl.scrollHeight;

        } else if (event.type === "done") {
          sessionId = event.sessionId || sessionId;
          if (sessionId) localStorage.setItem("chat_sessionId", sessionId);
          bubbleEl.classList.remove("streaming");

          if (event.costUsd > 0) {
            const costEl = document.createElement("div");
            costEl.className = "cost";
            costEl.textContent = "$" + event.costUsd.toFixed(4);
            msgEl.querySelector(".msg-body").appendChild(costEl);
          }
        }
      }
    }
  } catch (err) {
    showAssistant();
    mdEl.innerHTML = renderMarkdown("[Connection error]");
  }

  // Finalize
  removeReadingIndicator();
  bubbleEl.classList.remove("streaming");

  if (!assistantVisible) {
    messagesEl.appendChild(msgEl);
    mdEl.innerHTML = renderMarkdown("[No response]");
  }

  // Collapse thinking by default
  if (rawThinking) {
    thinkingEl.classList.add("collapsed");
  }

  // Add copy button with raw markdown text
  const { cleaned } = extractThinking(fullText);
  addCopyButton(bubbleEl, cleaned || fullText);

  sending = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

function appendUserMsg(text) {
  const el = document.createElement("div");
  el.className = "msg user";
  el.textContent = text;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function createAssistantMsg() {
  const msgEl = document.createElement("div");
  msgEl.className = "msg assistant";

  const avatar = document.createElement("div");
  avatar.className = "chat-avatar";
  avatar.textContent = "A";

  const body = document.createElement("div");
  body.className = "msg-body";

  const toolCardsEl = document.createElement("div");
  toolCardsEl.className = "tool-cards";

  const thinkingEl = document.createElement("div");
  thinkingEl.className = "chat-thinking";
  thinkingEl.style.display = "none";
  thinkingEl.innerHTML = `<div class="thinking-toggle">💭 Thinking...</div><div class="thinking-content"></div>`;
  thinkingEl.addEventListener("click", () => thinkingEl.classList.toggle("collapsed"));

  const bubbleEl = document.createElement("div");
  bubbleEl.className = "msg-bubble";

  const mdEl = document.createElement("div");
  mdEl.className = "md-content";

  bubbleEl.appendChild(mdEl);
  body.appendChild(toolCardsEl);
  body.appendChild(thinkingEl);
  body.appendChild(bubbleEl);
  msgEl.appendChild(avatar);
  msgEl.appendChild(body);

  return { msgEl, toolCardsEl, thinkingEl, bubbleEl, mdEl };
}

// --- Auth event listeners ---
document.getElementById("token-submit").addEventListener("click", async () => {
  const input = document.getElementById("token-input");
  const errorEl = document.getElementById("token-error");
  const token = input.value.trim();
  if (!token) return;

  errorEl.style.display = "none";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token,
      },
      body: JSON.stringify({ message: "/status" }),
    });

    if (res.status === 401) {
      errorEl.style.display = "block";
      errorEl.textContent = "Invalid token";
      return;
    }

    // Consume stream
    try { await res.text(); } catch {}

    // Save and proceed
    authToken = token;
    localStorage.setItem("chat_token", token);
    document.getElementById("auth-status").textContent = "Authenticated";
    hideAuthOverlay();
  } catch {
    errorEl.style.display = "block";
    errorEl.textContent = "Connection error";
  }
});

document.getElementById("token-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("token-submit").click();
});

// Check auth on page load
checkAuth();
</script>
</body>
</html>

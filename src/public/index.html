<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Claw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
<style>
  /* ══════════════════════════════════════════
     THEME TOKENS
     ══════════════════════════════════════════ */
  :root {
    --font-body: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
    --font-display: "Instrument Serif", Georgia, serif;
    --font-mono: "JetBrains Mono", "SF Mono", Monaco, Consolas, monospace;
    --radius: 14px;
    --radius-sm: 8px;
    --radius-xs: 5px;
    --max-chat-width: 800px;
    --sidebar-width: 260px;
    --header-h: 56px;
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* --- Dark theme (default) --- */
  [data-theme="dark"] {
    --bg-app: #08080c;
    --bg-main: #0c0c12;
    --bg-sidebar: #0a0a10;
    --bg-card: #14141e;
    --bg-card-hover: #1a1a28;
    --bg-input: #12121a;
    --bg-bubble: #16161f;
    --bg-user: #7c3aed;
    --bg-overlay: rgba(0,0,0,0.75);
    --border: rgba(255,255,255,0.06);
    --border-focus: rgba(139,92,246,0.5);
    --text-primary: #e4e2ee;
    --text-secondary: #8886a0;
    --text-muted: #55536a;
    --text-user: #fff;
    --accent: #a78bfa;
    --accent-dim: rgba(167,139,250,0.12);
    --accent-glow: rgba(167,139,250,0.06);
    --tool-bg: rgba(167,139,250,0.06);
    --tool-border: rgba(167,139,250,0.12);
    --thinking-bg: rgba(255,255,255,0.02);
    --thinking-border: rgba(255,255,255,0.06);
    --code-bg: #0d0d14;
    --code-text: #e6edf3;
    --success: #4ade80;
    --error: #f87171;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.5);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.6);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.7);
    --noise-opacity: 0.03;
    --logo-bg: linear-gradient(135deg, #7c3aed, #a78bfa);
    --logo-text: #fff;
  }

  /* --- Light theme --- */
  [data-theme="light"] {
    --bg-app: #f4f2f8;
    --bg-main: #faf9fc;
    --bg-sidebar: #eeedf4;
    --bg-card: #fff;
    --bg-card-hover: #f4f2f8;
    --bg-input: #fff;
    --bg-bubble: #fff;
    --bg-user: #6d28d9;
    --bg-overlay: rgba(0,0,0,0.4);
    --border: rgba(0,0,0,0.07);
    --border-focus: rgba(109,40,217,0.35);
    --text-primary: #1a1826;
    --text-secondary: #65637a;
    --text-muted: #9e9cb0;
    --text-user: #fff;
    --accent: #7c3aed;
    --accent-dim: rgba(124,58,237,0.08);
    --accent-glow: rgba(124,58,237,0.04);
    --tool-bg: rgba(124,58,237,0.04);
    --tool-border: rgba(124,58,237,0.1);
    --thinking-bg: rgba(0,0,0,0.02);
    --thinking-border: rgba(0,0,0,0.07);
    --code-bg: #1a1a2e;
    --code-text: #e6edf3;
    --success: #16a34a;
    --error: #dc2626;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
    --noise-opacity: 0.02;
    --logo-bg: linear-gradient(135deg, #7c3aed, #a78bfa);
    --logo-text: #fff;
  }

  /* ══════════════════════════════════════════
     RESET & BASE
     ══════════════════════════════════════════ */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; }
  body {
    font-family: var(--font-body);
    background: var(--bg-app);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Subtle noise texture overlay */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: var(--noise-opacity);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }

  ::selection {
    background: var(--accent);
    color: var(--text-user);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ══════════════════════════════════════════
     SIDEBAR
     ══════════════════════════════════════════ */
  #sidebar {
    width: var(--sidebar-width);
    height: 100vh;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: margin-left 350ms var(--ease-out), opacity 350ms var(--ease-out);
    z-index: 20;
    position: relative;
  }
  #sidebar.collapsed {
    margin-left: calc(-1 * var(--sidebar-width));
    opacity: 0;
    pointer-events: none;
  }

  .sidebar-header {
    padding: 16px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sidebar-logo {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--logo-bg);
    display: grid;
    place-items: center;
    font-family: var(--font-body);
    font-style: normal;
    font-size: 16px;
    font-weight: 700;
    color: var(--logo-text);
    line-height: 1;
  }
  .sidebar-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-style: italic;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }
  .sidebar-collapse-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    border-radius: var(--radius-xs);
    transition: color 150ms, background 150ms;
    display: grid;
    place-items: center;
  }
  .sidebar-collapse-btn:hover {
    color: var(--text-primary);
    background: var(--border);
  }

  .sidebar-new-btn {
    margin: 12px 12px 8px;
    padding: 10px 14px;
    background: var(--accent-dim);
    border: 1px solid var(--tool-border);
    border-radius: var(--radius-sm);
    color: var(--accent);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 200ms, transform 100ms;
  }
  .sidebar-new-btn:hover {
    background: var(--accent);
    color: #fff;
  }
  .sidebar-new-btn:active { transform: scale(0.98); }

  .sidebar-section-label {
    padding: 12px 16px 6px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }

  .sidebar-sessions {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 12px;
  }
  .sidebar-session-item {
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 150ms, color 150ms;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
  }
  .sidebar-session-item:hover {
    background: var(--bg-card-hover);
    color: var(--text-primary);
  }
  .sidebar-session-item.active {
    background: var(--accent-dim);
    color: var(--accent);
  }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* ══════════════════════════════════════════
     MAIN CONTENT AREA
     ══════════════════════════════════════════ */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    position: relative;
  }

  /* --- Header --- */
  header {
    height: var(--header-h);
    background: var(--bg-main);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-shrink: 0;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 10;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #sidebar-toggle {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 6px;
    border-radius: var(--radius-xs);
    display: grid;
    place-items: center;
    transition: color 150ms, background 150ms;
  }
  #sidebar-toggle:hover {
    color: var(--text-primary);
    background: var(--border);
  }
  .header-model {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .header-model .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #auth-status {
    font-size: 12px;
    color: var(--text-muted);
  }
  .header-icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    cursor: pointer;
    padding: 7px;
    border-radius: var(--radius-sm);
    display: grid;
    place-items: center;
    transition: all 200ms;
  }
  .header-icon-btn:hover {
    color: var(--text-primary);
    border-color: var(--text-muted);
    background: var(--bg-card);
  }

  /* ══════════════════════════════════════════
     MESSAGES AREA
     ══════════════════════════════════════════ */
  #messages-wrapper {
    flex: 1;
    overflow-y: auto;
    scroll-behavior: smooth;
  }
  #messages {
    max-width: var(--max-chat-width);
    width: 100%;
    margin: 0 auto;
    padding: 24px 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-height: 100%;
  }

  /* --- Welcome screen --- */
  #welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    animation: welcome-in 800ms var(--ease-out) both;
  }
  @keyframes welcome-in {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .welcome-orb {
    width: 80px; height: 80px;
    border-radius: 24px;
    background: var(--logo-bg);
    display: grid;
    place-items: center;
    margin-bottom: 28px;
    position: relative;
    animation: orb-float 4s ease-in-out infinite;
    box-shadow: 0 8px 40px var(--accent-dim), 0 0 80px var(--accent-glow);
  }
  .welcome-orb::before {
    content: "";
    position: absolute;
    inset: -8px;
    border-radius: 28px;
    background: linear-gradient(135deg, var(--accent), transparent, var(--accent));
    opacity: 0.15;
    animation: orb-ring 6s linear infinite;
  }
  .welcome-orb-letter {
    font-family: var(--font-body);
    font-size: 38px;
    font-style: normal;
    font-weight: 700;
    color: var(--logo-text);
    line-height: 1;
  }
  @keyframes orb-float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  @keyframes orb-ring {
    to { transform: rotate(360deg); }
  }

  .welcome-title {
    font-family: var(--font-display);
    font-size: 28px;
    font-style: italic;
    color: var(--text-primary);
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .welcome-sub {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 36px;
  }

  .welcome-suggestions {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 520px;
  }
  .welcome-suggestion {
    padding: 14px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 250ms var(--ease-out);
    text-align: left;
    font-family: var(--font-body);
  }
  .welcome-suggestion:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .welcome-suggestion-icon {
    font-size: 18px;
    margin-bottom: 8px;
    display: block;
  }
  .welcome-suggestion-text {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.4;
  }

  /* ══════════════════════════════════════════
     MESSAGES
     ══════════════════════════════════════════ */
  .msg {
    line-height: 1.65;
    word-break: break-word;
    font-size: 14.5px;
    animation: msg-in 300ms var(--ease-out) both;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    max-width: 72%;
    background: var(--bg-user);
    color: var(--text-user);
    padding: 11px 16px;
    border-radius: var(--radius) var(--radius) 4px var(--radius);
    white-space: pre-wrap;
    font-weight: 400;
    box-shadow: var(--shadow-sm);
  }

  .msg.assistant {
    align-self: flex-start;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  /* --- Avatar --- */
  .chat-avatar {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    background: var(--logo-bg);
    display: grid;
    place-items: center;
    flex-shrink: 0;
    margin-top: 2px;
    font-family: var(--font-body);
    font-style: normal;
    font-weight: 700;
    font-size: 15px;
    color: var(--logo-text);
    line-height: 1;
  }

  /* --- Bubble --- */
  .msg-body {
    flex: 1;
    min-width: 0;
    position: relative;
  }
  .msg-bubble {
    background: var(--bg-bubble);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) var(--radius) 4px;
    padding: 12px 16px;
    position: relative;
    transition: border-color 400ms;
  }
  .msg-bubble.streaming {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
    animation: stream-glow 2s ease-in-out infinite;
  }
  @keyframes stream-glow {
    0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
    50% { box-shadow: 0 0 30px var(--accent-dim); }
  }

  /* --- Thinking --- */
  .chat-thinking {
    margin-bottom: 10px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    border: 1px dashed var(--thinking-border);
    background: var(--thinking-bg);
    color: var(--text-muted);
    font-size: 12px;
    line-height: 1.5;
    cursor: pointer;
    overflow: hidden;
    transition: max-height 300ms var(--ease-out);
  }
  .chat-thinking.collapsed { max-height: 38px; }
  .chat-thinking .thinking-toggle {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .chat-thinking .thinking-content {
    white-space: pre-wrap;
    font-family: var(--font-mono);
    font-size: 11px;
  }

  /* ══════════════════════════════════════════
     TOOL CARDS
     ══════════════════════════════════════════ */
  .tool-cards { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .tool-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    background: var(--tool-bg);
    border: 1px solid var(--tool-border);
    font-size: 12px;
    color: var(--text-secondary);
    transition: all 200ms;
  }
  .tool-card__icon {
    width: 18px; height: 18px;
    flex-shrink: 0;
    display: grid;
    place-items: center;
  }
  .tool-card__spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .tool-card__check {
    color: var(--success);
    font-weight: 700;
    font-size: 13px;
  }
  .tool-card__name {
    font-weight: 500;
    font-family: var(--font-mono);
    font-size: 11.5px;
  }
  .tool-card__result {
    margin-top: 6px;
    padding: 6px 10px;
    background: var(--bg-card);
    border-radius: var(--radius-xs);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-muted);
    max-height: 200px;
    overflow-y: auto;
  }
  .tool-card__result.collapsed {
    max-height: 42px;
    overflow: hidden;
    cursor: pointer;
  }
  .tool-card__result.collapsed::after {
    content: "click to expand";
    display: block;
    color: var(--accent);
    font-size: 10px;
    margin-top: 3px;
  }
  .tool-card.has-result { flex-direction: column; align-items: stretch; }
  .tool-card.has-result .tool-card__header { display: flex; align-items: center; gap: 10px; }

  /* --- Copy button --- */
  .chat-copy-btn {
    position: absolute;
    top: 8px;
    right: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    padding: 3px 8px;
    font-size: 11px;
    font-family: var(--font-body);
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: all 150ms;
    color: var(--text-muted);
  }
  .msg-bubble:hover .chat-copy-btn {
    opacity: 1;
    pointer-events: auto;
  }
  .chat-copy-btn:hover {
    background: var(--accent-dim);
    color: var(--accent);
    border-color: var(--tool-border);
  }

  /* --- Reading indicator --- */
  .reading-indicator {
    align-self: flex-start;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    animation: msg-in 300ms var(--ease-out) both;
  }
  .reading-dots {
    background: var(--bg-bubble);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .reading-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: reading-pulse 1.4s ease-in-out infinite;
  }
  .reading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .reading-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* ══════════════════════════════════════════
     MARKDOWN CONTENT
     ══════════════════════════════════════════ */
  .md-content { color: var(--text-primary); }
  .md-content p { margin: 0.45em 0; }
  .md-content p:first-child { margin-top: 0; }
  .md-content p:last-child { margin-bottom: 0; }
  .md-content h1, .md-content h2, .md-content h3, .md-content h4 {
    margin: 0.7em 0 0.3em;
    line-height: 1.3;
    font-family: var(--font-display);
    font-style: italic;
    color: var(--text-primary);
  }
  .md-content h1 { font-size: 1.35em; }
  .md-content h2 { font-size: 1.2em; }
  .md-content h3 { font-size: 1.08em; }
  .md-content ul, .md-content ol {
    margin: 0.45em 0;
    padding-left: 1.5em;
  }
  .md-content li { margin: 0.2em 0; }
  .md-content code {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: var(--radius-xs);
    font-size: 0.88em;
    font-family: var(--font-mono);
  }
  .md-content pre {
    margin: 0.6em 0;
    border-radius: var(--radius-sm);
    overflow-x: auto;
    position: relative;
    border: 1px solid var(--border);
  }
  .md-content pre code {
    display: block;
    padding: 14px 16px;
    background: var(--code-bg);

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
<script>
// ═══════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════
const savedTheme = localStorage.getItem("chat_theme") || "dark";
document.documentElement.setAttribute("data-theme", savedTheme);
updateThemeIcon(savedTheme);

document.getElementById("theme-toggle").addEventListener("click", () => {
  const current = document.documentElement.getAttribute("data-theme");
  const next = current === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("chat_theme", next);
  updateThemeIcon(next);
});

function updateThemeIcon(theme) {
  document.getElementById("theme-icon-dark").style.display = theme === "dark" ? "block" : "none";
  document.getElementById("theme-icon-light").style.display = theme === "light" ? "block" : "none";
}

// ═══════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════
const sidebar = document.getElementById("sidebar");
document.getElementById("sidebar-toggle").addEventListener("click", () => sidebar.classList.toggle("collapsed"));
document.getElementById("sidebar-close").addEventListener("click", () => sidebar.classList.add("collapsed"));

// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
let authToken = localStorage.getItem("chat_token") || "";

async function checkAuth() {
  try {
    const headers = {};
    if (authToken) headers["Authorization"] = "Bearer " + authToken;

    const res = await fetch("/api/chat", { headers });

    if (res.status === 401) {
      showAuthOverlay();
      return false;
    }

    const data = await res.json().catch(() => ({}));
    if (data.userId && data.userId !== "web-anonymous") {
      document.getElementById("auth-status").textContent = data.userId;
    }
    return true;
  } catch {
    return true;
  }
}

function showAuthOverlay() {
  const overlay = document.getElementById("auth-overlay");
  overlay.style.display = "flex";
}

function hideAuthOverlay() {
  document.getElementById("auth-overlay").style.display = "none";
}

// ═══════════════════════════════════════════
// CONFIG & MARKDOWN
// ═══════════════════════════════════════════
const TOOL_INLINE_THRESHOLD = 80;

marked.setOptions({ gfm: true, breaks: true });

function renderMarkdown(text) {
  if (!text) return "";
  try {
    return marked.parse(text);
  } catch { return escapeHtml(text); }
}

function escapeHtml(s) {
  const div = document.createElement("div");
  div.textContent = s;
  return div.innerHTML;
}

// ═══════════════════════════════════════════
// THINKING EXTRACTION
// ═══════════════════════════════════════════
function extractThinking(text) {
  const re = /<\s*think(?:ing)?\s*>([\s\S]*?)<\s*\/\s*think(?:ing)?\s*>/gi;
  const blocks = [];
  let cleaned = text;
  let match;
  while ((match = re.exec(text)) !== null) {
    blocks.push(match[1].trim());
  }
  cleaned = text.replace(re, "").trim();
  return { thinking: blocks.join("\n\n"), cleaned };
}

// ═══════════════════════════════════════════
// DOM REFS
// ═══════════════════════════════════════════
const scrollEl = document.getElementById("messages-wrapper");
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("send");
const charCountEl = document.getElementById("char-count");
let sessionId = localStorage.getItem("chat_sessionId") || null;
let sending = false;

// ═══════════════════════════════════════════
// INPUT HANDLING
// ═══════════════════════════════════════════
inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  const len = inputEl.value.length;
  charCountEl.textContent = len > 0 ? len + " chars" : "";
});
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey && !e.isComposing) { e.preventDefault(); send(); }
});
sendBtn.addEventListener("click", send);

// ═══════════════════════════════════════════
// WELCOME SUGGESTIONS
// ═══════════════════════════════════════════
document.querySelectorAll(".welcome-suggestion").forEach(btn => {
  btn.addEventListener("click", () => {
    const prompt = btn.getAttribute("data-prompt");
    if (prompt) {
      inputEl.value = prompt;
      inputEl.dispatchEvent(new Event("input"));
      send();
    }
  });
});

// ═══════════════════════════════════════════
// NEW CHAT
// ═══════════════════════════════════════════
document.getElementById("new-chat-btn").addEventListener("click", () => {
  sessionId = null;
  localStorage.removeItem("chat_sessionId");
  messagesEl.innerHTML = `
    <div id="welcome">
      <div class="welcome-orb"><span class="welcome-orb-letter">A</span></div>
      <div class="welcome-title">What can I help with?</div>
      <div class="welcome-sub">Ask anything or pick a suggestion below</div>
      <div class="welcome-suggestions">
        <button class="welcome-suggestion" data-prompt="Help me debug an issue in my code">
          <span class="welcome-suggestion-icon">&#x1f41b;</span>
          <span class="welcome-suggestion-text">Debug an issue in my code</span>
        </button>
        <button class="welcome-suggestion" data-prompt="Explain how this codebase works">
          <span class="welcome-suggestion-icon">&#x1f4d6;</span>
          <span class="welcome-suggestion-text">Explain this codebase</span>
        </button>
        <button class="welcome-suggestion" data-prompt="Search the web for the latest news about AI">
          <span class="welcome-suggestion-icon">&#x1f310;</span>
          <span class="welcome-suggestion-text">Search the web for info</span>
        </button>
        <button class="welcome-suggestion" data-prompt="Write a summary of the recent changes">
          <span class="welcome-suggestion-icon">&#x1f4dd;</span>
          <span class="welcome-suggestion-text">Summarize recent changes</span>
        </button>
      </div>
    </div>`;
  // Re-bind suggestion clicks
  document.querySelectorAll(".welcome-suggestion").forEach(btn => {
    btn.addEventListener("click", () => {
      const prompt = btn.getAttribute("data-prompt");
      if (prompt) { inputEl.value = prompt; inputEl.dispatchEvent(new Event("input")); send(); }
    });
  });
  inputEl.focus();
});

function hideWelcome() {
  const w = document.getElementById("welcome");
  if (w) w.remove();
}

// ═══════════════════════════════════════════
// READING INDICATOR
// ═══════════════════════════════════════════
function showReadingIndicator() {
  const el = document.createElement("div");
  el.className = "reading-indicator";
  el.id = "reading-indicator";
  el.innerHTML = `
    <div class="chat-avatar">A</div>
    <div class="reading-dots"><span></span><span></span><span></span></div>
  `;
  messagesEl.appendChild(el);
  scrollEl.scrollTop = scrollEl.scrollHeight;
  return el;
}

function removeReadingIndicator() {
  const el = document.getElementById("reading-indicator");
  if (el) el.remove();
}

// ═══════════════════════════════════════════
// TOOL CARDS
// ═══════════════════════════════════════════
let toolCardCounter = 0;

function createToolCard(toolName) {
  const id = "tool-" + (++toolCardCounter);
  const card = document.createElement("div");
  card.className = "tool-card";
  card.id = id;
  card.innerHTML = `
    <div class="tool-card__icon"><div class="tool-card__spinner"></div></div>
    <span class="tool-card__name">${escapeHtml(toolName)}</span>
  `;
  return { card, id };
}

function updateToolCard(cardId, toolName, output) {
  const card = document.getElementById(cardId);
  if (!card) return;

  const isShort = output && output.length <= TOOL_INLINE_THRESHOLD;
  const hasOutput = output && output.trim().length > 0;

  if (hasOutput) {
    card.className = "tool-card has-result";
    const resultClass = isShort ? "tool-card__result" : "tool-card__result collapsed";
    card.innerHTML = `
      <div class="tool-card__header">
        <div class="tool-card__icon"><span class="tool-card__check">\u2713</span></div>
        <span class="tool-card__name">${escapeHtml(toolName)}</span>
      </div>
      <div class="${resultClass}">${escapeHtml(output.slice(0, 2000))}</div>
    `;
    if (!isShort) {
      const resultEl = card.querySelector(".tool-card__result");
      resultEl.addEventListener("click", () => resultEl.classList.toggle("collapsed"));
    }
  } else {
    card.innerHTML = `
      <div class="tool-card__icon"><span class="tool-card__check">\u2713</span></div>
      <span class="tool-card__name">${escapeHtml(toolName)}</span>
      <span style="color:var(--text-muted);font-size:11px;">done</span>
    `;
  }
}

// ═══════════════════════════════════════════
// COPY BUTTONS
// ═══════════════════════════════════════════
function addCopyButton(bubbleEl, rawText) {
  const btn = document.createElement("button");
  btn.className = "chat-copy-btn";
  btn.textContent = "Copy";
  btn.addEventListener("click", async (e) => {
    e.stopPropagation();
    try {
      await navigator.clipboard.writeText(rawText);
      btn.textContent = "\u2713";
      setTimeout(() => (btn.textContent = "Copy"), 1500);
    } catch {
      btn.textContent = "Failed";
      setTimeout(() => (btn.textContent = "Copy"), 1500);
    }
  });
  bubbleEl.appendChild(btn);
}

function addCodeCopyButtons(container) {
  container.querySelectorAll("pre code").forEach((codeEl) => {
    if (typeof hljs !== "undefined") hljs.highlightElement(codeEl);
    const pre = codeEl.parentElement;
    if (pre.querySelector(".code-copy-btn")) return;
    const btn = document.createElement("button");
    btn.className = "code-copy-btn";
    btn.textContent = "Copy";
    btn.addEventListener("click", async (e) => {
      e.stopPropagation();
      try {
        await navigator.clipboard.writeText(codeEl.textContent);
        btn.textContent = "\u2713";
        setTimeout(() => (btn.textContent = "Copy"), 1500);
      } catch {
        btn.textContent = "Failed";
        setTimeout(() => (btn.textContent = "Copy"), 1500);
      }
    });
    pre.style.position = "relative";
    pre.appendChild(btn);
  });
}

// ═══════════════════════════════════════════
// SEND MESSAGE
// ═══════════════════════════════════════════
async function send() {
  const text = inputEl.value.trim();
  if (!text || sending) return;

  sending = true;
  sendBtn.disabled = true;
  inputEl.value = "";
  inputEl.style.height = "auto";
  charCountEl.textContent = "";

  hideWelcome();
  appendUserMsg(text);
  showReadingIndicator();

  const { msgEl, toolCardsEl, thinkingEl, bubbleEl, mdEl } = createAssistantMsg();
  let assistantVisible = false;
  let fullText = "";
  let rawThinking = "";
  let currentToolCardId = null;
  let gotFirstToken = false;

  function showAssistant() {
    if (!assistantVisible) {
      removeReadingIndicator();
      messagesEl.appendChild(msgEl);
      assistantVisible = true;
    }
  }

  try {
    const headers = { "Content-Type": "application/json" };
    if (authToken) headers["Authorization"] = "Bearer " + authToken;

    const res = await fetch("/api/chat", {
      method: "POST",
      headers,
      body: JSON.stringify({ message: text, sessionId }),
    });

    if (res.status === 401) {
      removeReadingIndicator();
      localStorage.removeItem("chat_token");
      authToken = "";
      showAuthOverlay();
      sending = false;
      sendBtn.disabled = false;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split("\n");
      buffer = lines.pop() || "";

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith("data: ")) continue;
        let event;
        try { event = JSON.parse(trimmed.slice(6)); } catch { continue; }

        if (event.type === "text") {
          showAssistant();
          if (!gotFirstToken) {
            gotFirstToken = true;
            bubbleEl.classList.add("streaming");
          }
          fullText += event.content;

          const { thinking, cleaned } = extractThinking(fullText);

          if (thinking) {
            rawThinking = thinking;
            thinkingEl.style.display = "block";
            thinkingEl.querySelector(".thinking-content").textContent = thinking;
          }

          mdEl.innerHTML = renderMarkdown(cleaned);
          addCodeCopyButtons(mdEl);
          scrollEl.scrollTop = scrollEl.scrollHeight;

        } else if (event.type === "tool_use") {
          showAssistant();
          const { card, id } = createToolCard(event.tool);
          currentToolCardId = id;
          toolCardsEl.appendChild(card);
          scrollEl.scrollTop = scrollEl.scrollHeight;

        } else if (event.type === "tool_result") {
          if (currentToolCardId) {
            updateToolCard(currentToolCardId, event.tool, event.output);
            currentToolCardId = null;
          }
          scrollEl.scrollTop = scrollEl.scrollHeight;

        } else if (event.type === "error") {
          showAssistant();
          fullText += "\n[Error: " + event.message + "]";
          const { thinking, cleaned } = extractThinking(fullText);
          mdEl.innerHTML = renderMarkdown(cleaned);
          scrollEl.scrollTop = scrollEl.scrollHeight;

        } else if (event.type === "done") {
          sessionId = event.sessionId || sessionId;
          if (sessionId) localStorage.setItem("chat_sessionId", sessionId);
          bubbleEl.classList.remove("streaming");

          if (event.costUsd > 0) {
            const costEl = document.createElement("div");
            costEl.className = "cost";
            costEl.textContent = "$" + event.costUsd.toFixed(4);
            msgEl.querySelector(".msg-body").appendChild(costEl);
          }
        }
      }
    }
  } catch (err) {
    showAssistant();
    if (fullText) {
      fullText += "\n\n[Connection error]";
      const { thinking, cleaned } = extractThinking(fullText);
      mdEl.innerHTML = renderMarkdown(cleaned);
    } else {
      mdEl.innerHTML = renderMarkdown("[Connection error]");
    }
  }

  removeReadingIndicator();
  bubbleEl.classList.remove("streaming");

  if (!assistantVisible) {
    messagesEl.appendChild(msgEl);
    mdEl.innerHTML = renderMarkdown("[No response]");
  }

  if (rawThinking) {
    thinkingEl.classList.add("collapsed");
  }

  const { cleaned } = extractThinking(fullText);
  addCopyButton(bubbleEl, cleaned || fullText);

  sending = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

function appendUserMsg(text) {
  const el = document.createElement("div");
  el.className = "msg user";
  el.textContent = text;
  messagesEl.appendChild(el);
  scrollEl.scrollTop = scrollEl.scrollHeight;
}

function createAssistantMsg() {
  const msgEl = document.createElement("div");
  msgEl.className = "msg assistant";

  const avatar = document.createElement("div");
  avatar.className = "chat-avatar";
  avatar.textContent = "A";

  const body = document.createElement("div");
  body.className = "msg-body";

  const toolCardsEl = document.createElement("div");
  toolCardsEl.className = "tool-cards";

  const thinkingEl = document.createElement("div");
  thinkingEl.className = "chat-thinking";
  thinkingEl.style.display = "none";
  thinkingEl.innerHTML = `<div class="thinking-toggle"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg> Thinking\u2026</div><div class="thinking-content"></div>`;
  thinkingEl.addEventListener("click", () => thinkingEl.classList.toggle("collapsed"));

  const bubbleEl = document.createElement("div");
  bubbleEl.className = "msg-bubble";

  const mdEl = document.createElement("div");
  mdEl.className = "md-content";

  bubbleEl.appendChild(mdEl);
  body.appendChild(toolCardsEl);
  body.appendChild(thinkingEl);
  body.appendChild(bubbleEl);
  msgEl.appendChild(avatar);
  msgEl.appendChild(body);

  return { msgEl, toolCardsEl, thinkingEl, bubbleEl, mdEl };
}

// ═══════════════════════════════════════════
// AUTH EVENT LISTENERS
// ═══════════════════════════════════════════
document.getElementById("token-submit").addEventListener("click", async () => {
  const input = document.getElementById("token-input");
  const errorEl = document.getElementById("token-error");
  const token = input.value.trim();
  if (!token) return;

  errorEl.style.display = "none";

  try {
    const res = await fetch("/api/chat", {
      headers: { Authorization: "Bearer " + token },
    });

    if (res.status === 401) {
      errorEl.style.display = "block";
      errorEl.textContent = "Invalid token";
      return;
    }

    authToken = token;
    localStorage.setItem("chat_token", token);
    const data = await res.json().catch(() => ({}));
    document.getElementById("auth-status").textContent = data.userId || "Authenticated";
    hideAuthOverlay();
  } catch {
    errorEl.style.display = "block";
    errorEl.textContent = "Connection error";
  }
});

document.getElementById("token-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("token-submit").click();
});

// Check auth on page load
checkAuth();
</script>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hub Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #1a1a2e;
    color: #fff;
    padding: 12px 20px;
    font-size: 16px;
    font-weight: 600;
    flex-shrink: 0;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 14px;
  }
  .msg.user {
    align-self: flex-end;
    background: #1a1a2e;
    color: #fff;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #fff;
    border: 1px solid #e0e0e0;
  }
  .msg .tool-badge {
    display: inline-block;
    background: #e8f4fd;
    color: #0277bd;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    margin: 2px 0;
  }
  .msg .cost {
    font-size: 11px;
    color: #999;
    margin-top: 4px;
  }
  #input-area {
    flex-shrink: 0;
    border-top: 1px solid #e0e0e0;
    background: #fff;
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #input {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
    outline: none;
  }
  #input:focus { border-color: #1a1a2e; }
  #send {
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
  <header>AI Hub Chat</header>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Ask anything..."></textarea>
    <button id="send">Send</button>
  </div>

<script>
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("send");
let sessionId = null;
let sending = false;

inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
});

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener("click", send);

async function send() {
  const text = inputEl.value.trim();
  if (!text || sending) return;

  sending = true;
  sendBtn.disabled = true;
  inputEl.value = "";
  inputEl.style.height = "auto";

  appendMsg("user", text);

  const assistantEl = appendMsg("assistant", "");
  let fullText = "";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, sessionId }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split("\n");
      buffer = lines.pop() || "";

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith("data: ")) continue;
        let event;
        try { event = JSON.parse(trimmed.slice(6)); } catch { continue; }

        if (event.type === "text") {
          fullText += event.content;
          assistantEl.querySelector(".content").textContent = fullText;
          messagesEl.scrollTop = messagesEl.scrollHeight;
        } else if (event.type === "tool_use") {
          const badge = document.createElement("span");
          badge.className = "tool-badge";
          badge.textContent = event.tool;
          assistantEl.querySelector(".content").appendChild(badge);
        } else if (event.type === "error") {
          fullText += "\n[Error: " + event.message + "]";
          assistantEl.querySelector(".content").textContent = fullText;
        } else if (event.type === "done") {
          sessionId = event.sessionId || sessionId;
          if (event.costUsd > 0) {
            const costEl = document.createElement("div");
            costEl.className = "cost";
            costEl.textContent = "$" + event.costUsd.toFixed(4);
            assistantEl.appendChild(costEl);
          }
        }
      }
    }
  } catch (err) {
    assistantEl.querySelector(".content").textContent = "[Connection error]";
  }

  if (!fullText) {
    assistantEl.querySelector(".content").textContent = "[No response]";
  }

  sending = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

function appendMsg(role, text) {
  const el = document.createElement("div");
  el.className = "msg " + role;
  const content = document.createElement("span");
  content.className = "content";
  content.textContent = text;
  el.appendChild(content);
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}
</script>
</body>
</html>
